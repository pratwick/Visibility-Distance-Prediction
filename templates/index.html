<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Climate Visibility Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/index_style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<section class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">
            🌫️ Climate Visibility Prediction System
        </h2>

        <form action="/predict" method="post">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label"><b>Temperature (°C)</b></label>
                    <input class="form-control" type="number" step="any" name="temp_c" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label"><b>Dew Point Temperature (°C)</b></label>
                    <input class="form-control" type="number" step="any" name="dew_point_temp_c" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label"><b>Relative Humidity (%)</b></label>
                    <input class="form-control" type="number" step="any" name="rel_hum" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label"><b>Wind Speed (km/h)</b></label>
                    <input class="form-control" type="number" step="any" name="wind_speed" required>
                </div>

                <div class="col-md-12 mb-3">
                    <label class="form-label"><b>Pressure (kPa)</b></label>
                    <input class="form-control" type="number" step="any" name="press_kpa" required>
                </div>

            </div>

            <div class="text-center mt-3">
                <input class="btn btn-primary px-5" type="submit" value="Predict Visibility">
            </div>

        </form>

        {% if prediction %}
        <div class="alert alert-success mt-4 text-center">
            <h4>🌤 Predicted Visibility: <b>{{ prediction }} km</b></h4>
        </div>
        {% endif %}

    </div>

</section>

</body>
</html>
