<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction Result</title>

    <style>
        body {
            font-family: 'Segoe UI';
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            margin: 0;
        }

        .container {
            max-width: 600px;
            margin: 100px auto;
            padding: 40px;
            background: #ffffffcc;
            border-radius: 16px;
            text-align: center;
        }

        .prediction {
            font-size: 2.5rem;
            font-weight: bold;
            color: #007acc;
        }

        .low { color: red; }
        .medium { color: orange; }
        .high { color: green; }
    </style>
</head>

<body>
<div class="container">

    <h1>🌤️ Predicted Visibility</h1>

    {% if prediction is not none %}

        <div class="prediction
            {% if prediction < 1 %}
                low
            {% elif prediction < 5 %}
                medium
            {% else %}
                high
            {% endif %}
        ">
            {{ "%.3f"|format(prediction) }} km
        </div>

        <p>Status: {{ status }}</p>
        <p>Artifact Used: {{ artifact_used }}</p>

    {% else %}
        <div class="prediction"> Error occurred</div>
    {% endif %}

    <a href="/">← Back to Home</a>

</div>
</body>
</html>
